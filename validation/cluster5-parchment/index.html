<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Verdant Café — loyalty card</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="/recipes.css" />
    <style>
      /* M3.1 impl.md §4 Cluster 5: page bg #F5F0E6 parchment, strict. */
      html, body { background: #F5F0E6; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #3D5A2E; }
      .font-editorial { font-family: 'Cormorant Garamond', 'Source Serif Pro', Georgia, ui-serif, serif; }
    </style>
  </head>
  <body class="min-h-screen flex items-start justify-center py-8">

    <!--
      VALIDATION HERO #5 — Cluster 5 (Artisanal Flat Parchment Café UI)

      Strictest constraint set in the moodboard:
        - All UI elements strictly contained within frame — zero overflow.
        - Zero shadows anywhere on UI chrome.
        - No 3D, no neumorphic, no photographic, no glossy.
        - Watercolor illustrations + stamp/seal + flat olive-green CTA.

      impl.md §4 Cluster 5 Layout Sketch (verbatim):
        Mobile-only column 360–390px. Full-screen parchment #F5F0E6 bg.
        Top 200–240px: watercolor illustration inlay edge-to-edge, contained
        within a rounded-top card (border-radius: 20px 20px 0 0). Below:
        white or parchment content area with 24px padding. Loyalty donut
        SVG widget centered, 120×120px, with four botanical SVG corner
        decorations at ±8px from corners. CTA button full-width, 48px tall,
        border-radius: 8px, background: #3D5A2E, no shadow. Stamp/seal logo
        64×64px, centered at top of content area. Vertical rhythm: 16px.

      Note: my m31-recipes.css ships .vrec-parchmentcta but no parchment
      card/inlay recipe — I hand-style the card with `background: #F5F0E6`
      + olive-green dashed border (the spec's "thin 1px olive borders on
      cream rather than drop shadows — this is a paper-print aesthetic").
    -->

    <main class="w-[390px] mx-auto">

      <!-- ── Card 1 · Loyalty card (the hero of this screen) ───────────────── -->
      <article class="overflow-hidden"
               style="background: #F5F0E6; border: 1px solid rgba(61,90,46,0.18); border-radius: 20px;">

        <!-- Top inlay: watercolor coffee-plant illustration, contained -->
        <div style="height: 220px; background: #E8E0D0; border-bottom: 1px solid rgba(61,90,46,0.12); position: relative; overflow: hidden;">
          <img src="/assets/coffee-plant-berries.png" alt=""
               style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 200px; height: auto;"
               aria-hidden="true" />
          <!-- subtle paper-grain texture via tiny dotted pattern -->
          <div style="position:absolute; inset:0; background-image: radial-gradient(rgba(61,90,46,0.06) 0.5px, transparent 0.5px); background-size: 6px 6px; pointer-events:none;"></div>
        </div>

        <!-- Content area (parchment, no shadows) -->
        <div class="px-6 pt-6 pb-7" style="background:#F5F0E6;">

          <!-- Stamp/seal logo — inline SVG, 64×64 centered -->
          <div class="flex justify-center mb-4">
            <svg width="64" height="64" viewBox="0 0 64 64" aria-hidden="true">
              <!-- vintage stamp double ring -->
              <circle cx="32" cy="32" r="30" fill="none" stroke="#3D5A2E" stroke-width="1.2"/>
              <circle cx="32" cy="32" r="26" fill="none" stroke="#3D5A2E" stroke-width="0.8" stroke-dasharray="2 3"/>
              <!-- center mark -->
              <text x="32" y="29" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="11" fill="#3D5A2E">verdant</text>
              <text x="32" y="40" text-anchor="middle" font-family="ui-sans-serif, sans-serif" font-size="6" letter-spacing="0.15em" fill="#3D5A2E">CAFÉ · EST 24</text>
              <!-- tiny leaf decorations -->
              <path d="M 18 32 Q 16 30 18 28 Q 20 30 18 32 Z" fill="#5A8A6A" opacity="0.7"/>
              <path d="M 46 32 Q 48 30 46 28 Q 44 30 46 32 Z" fill="#5A8A6A" opacity="0.7"/>
            </svg>
          </div>

          <!-- Headline -->
          <p class="text-center text-[11px] uppercase tracking-[0.20em] mb-1" style="color: rgba(61,90,46,0.7);">spring loyalty</p>
          <h1 class="font-editorial text-center text-[26px] italic font-light leading-tight mb-1" style="color:#3D5A2E;">
            Seven sips closer<br/>to a free cup.
          </h1>
          <p class="text-center text-[13px] mb-6" style="color: rgba(61,90,46,0.75);">
            Three more cups until your spring blend.
          </p>

          <!-- Loyalty donut SVG widget: 120×120, stroke-dasharray progress ring -->
          <div class="flex justify-center mb-2">
            <div style="position:relative; width:120px; height:120px;">

              <!-- corner botanical decorations at ±8px from the donut bounding box -->
              <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"
                   style="position:absolute; top:-8px; left:-8px;">
                <path d="M 2 18 Q 4 4 18 2 M 4 14 Q 8 8 14 4" fill="none" stroke="#5A8A6A" stroke-width="1.2" stroke-linecap="round"/>
                <ellipse cx="6" cy="10" rx="1.2" ry="3" fill="#5A8A6A" transform="rotate(45 6 10)"/>
              </svg>
              <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"
                   style="position:absolute; top:-8px; right:-8px; transform: scaleX(-1);">
                <path d="M 2 18 Q 4 4 18 2 M 4 14 Q 8 8 14 4" fill="none" stroke="#5A8A6A" stroke-width="1.2" stroke-linecap="round"/>
                <ellipse cx="6" cy="10" rx="1.2" ry="3" fill="#5A8A6A" transform="rotate(45 6 10)"/>
              </svg>
              <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"
                   style="position:absolute; bottom:-8px; left:-8px; transform: scaleY(-1);">
                <path d="M 2 18 Q 4 4 18 2 M 4 14 Q 8 8 14 4" fill="none" stroke="#5A8A6A" stroke-width="1.2" stroke-linecap="round"/>
                <ellipse cx="6" cy="10" rx="1.2" ry="3" fill="#5A8A6A" transform="rotate(45 6 10)"/>
              </svg>
              <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true"
                   style="position:absolute; bottom:-8px; right:-8px; transform: scale(-1, -1);">
                <path d="M 2 18 Q 4 4 18 2 M 4 14 Q 8 8 14 4" fill="none" stroke="#5A8A6A" stroke-width="1.2" stroke-linecap="round"/>
                <ellipse cx="6" cy="10" rx="1.2" ry="3" fill="#5A8A6A" transform="rotate(45 6 10)"/>
              </svg>

              <!-- the donut: stroke-dasharray progress -->
              <svg width="120" height="120" viewBox="0 0 120 120">
                <!-- track -->
                <circle cx="60" cy="60" r="50" fill="none" stroke="#E8E0D0" stroke-width="8"/>
                <!-- progress (7/10 = 70%, circumference 2*pi*50 ≈ 314, 70% ≈ 220) -->
                <circle cx="60" cy="60" r="50" fill="none" stroke="#3D5A2E" stroke-width="8"
                        stroke-dasharray="220 314" stroke-dashoffset="0"
                        transform="rotate(-90 60 60)" stroke-linecap="round"/>
                <!-- center label -->
                <text x="60" y="58" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="36" fill="#3D5A2E">7</text>
                <text x="60" y="76" text-anchor="middle" font-family="ui-sans-serif" font-size="10" letter-spacing="0.1em" fill="#3D5A2E" opacity="0.7">of 10 sips</text>
              </svg>
            </div>
          </div>
          <p class="text-center text-[10px] uppercase tracking-[0.18em] mb-7" style="color: rgba(61,90,46,0.55);">your card · valid through june</p>

          <!-- Flat CTA — no shadow, olive-green, 48px tall, radius 8px -->
          <a href="#claim"
             class="block w-full text-center text-[14px] font-medium py-[14px] no-underline"
             style="background:#3D5A2E; color:#F5F0E6; border-radius: 8px;">
            Redeem at counter
          </a>

          <p class="text-center text-[11px] mt-3" style="color: rgba(61,90,46,0.55);">
            Show this screen to your barista
          </p>
        </div>
      </article>

      <!-- ── Card 2 · Smaller stamp-style "Café story" inlay ─────────────── -->
      <article class="mt-4 overflow-hidden"
               style="background: #F5F0E6; border: 1px solid rgba(61,90,46,0.18); border-radius: 16px;">
        <div class="flex items-center gap-4 p-4">
          <div style="flex-shrink:0; width: 64px; height: 64px; overflow:hidden; border-radius: 50%; background:#E8E0D0; display:flex; align-items:center; justify-content:center;">
            <img src="/assets/botanical-wreath.png" alt="" style="width: 70px; height: auto;" aria-hidden="true" />
          </div>
          <div>
            <p class="text-[10px] uppercase tracking-[0.18em]" style="color: rgba(61,90,46,0.6);">read the field notes</p>
            <p class="font-editorial italic text-[16px] mt-0.5" style="color:#3D5A2E;">How we forage our spring blend</p>
          </div>
        </div>
      </article>

      <!-- bottom footer text, flat -->
      <footer class="mt-5 text-center text-[11px] tracking-wide" style="color: rgba(61,90,46,0.5);">
        verdant café · printed in cream · 2026
      </footer>

    </main>

  </body>
</html>
