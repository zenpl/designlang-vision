<!doctype html>
<!--
  AFTER — 种子集市 (pdx-gardener) 首页 hero, with Cluster 5 (Artisanal Flat
  Parchment Café UI) styling applied via overlay tokens + a few decorative
  HTML additions (stamp seal SVG + small watercolor wreath inlay).

  HTML structure is IDENTICAL to before.html. Only changes:
  - extra <link>-equivalent <style> block at end (the "cluster5-overlay.css"
    from apply-plan.md §2)
  - inline SVG stamp/seal after the home-sub
  - small watercolor wreath asset next to the H1 (instead of 🌱 emoji)
  - 80×80 user-photo thumbnails are UNCHANGED — still emoji placeholders
    representing "user content stays untouched"

  Compare before.html to this side-by-side. Notable preserved invariants:
  - layout, touch targets, section ordering, color SEMANTICS (free=green,
    paid=red, barter=warn yellow), tab structure (not shown), card flex
    row with 80×80 thumb + flex:1 text — all identical.
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>菜友集市 · after (Cluster 5)</title>
<style>
/* === pdx-gardener current CSS (verbatim, unchanged) === */
:root {
  --primary:#2D6A4F;
  --primary-deep:#1B4332;
  --primary-soft:#D8F3DC;
  --primary-light:#95D5B2;
  --bg-page:#F5F0EB;
  --bg-card:#FDFAF7;
  --bg-soft:#FAF7F2;
  --text:#2D3436;
  --text-secondary:#636E72;
  --text-body:#555B5A;
  --muted:#636E72;
  --shadow-1:0 2px 8px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.06);
  --radius-card:12px;
  --radius-btn:10px;
  --radius-tag:6px;
  --radius-pill:9999px;
  --fs-xs:12px;
  --fs-sm:14px;
  --fs-md:16px;
  --fs-lg:18px;
  --fs-display:28px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px;
}
html,body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg-page);color:var(--text);font-size:var(--fs-sm);line-height:1.55;min-height:100vh;overflow-x:hidden;margin:0}
.view{padding:var(--sp-4);max-width:420px;margin:0 auto;padding-bottom:80px}
.muted{color:var(--text-secondary);font-size:var(--fs-xs);line-height:1.5}
.link{color:var(--primary);cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--primary);padding-bottom:1px}
button,.btn{display:inline-flex;align-items:center;justify-content:center;padding:var(--sp-3) var(--sp-5);border:none;border-radius:var(--radius-btn);background:var(--primary);color:#fff;font-size:var(--fs-sm);font-weight:500;cursor:pointer;min-height:44px}
.btn-block{width:100%;padding:var(--sp-4);font-size:var(--fs-md);font-weight:600;margin-top:var(--sp-3);border-radius:var(--radius-pill)}
.btn-line{background:var(--bg-card);color:var(--primary);border:1px solid var(--primary)}
.home-hero-title{font-size:var(--fs-display);letter-spacing:-0.02em;line-height:1.15;margin-bottom:var(--sp-3);font-weight:700}
.home-sub{font-size:var(--fs-sm);color:var(--muted);margin-top:var(--sp-1);line-height:1.4}
.home-actions{display:flex;gap:var(--sp-2);margin-top:var(--sp-3)}
.home-actions .btn-block{flex:1;margin:0}
.home-section-head{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-2);margin:var(--sp-5) 0 var(--sp-2)}
.home-section-head h2{margin:0;font-size:var(--fs-lg)}
.home-section-head .link{font-size:var(--fs-sm)}
.count-badge{display:inline-flex;align-items:center;background:var(--primary-light);color:var(--primary-deep);font-size:var(--fs-xs);font-weight:600;padding:2px var(--sp-2);border-radius:var(--radius-tag);margin-left:var(--sp-2);line-height:1.5}
.exchange-card{display:flex;gap:var(--sp-3);padding:var(--sp-3);background:var(--bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-1);margin-bottom:var(--sp-3)}
.exchange-thumb{width:80px;height:80px;flex-shrink:0;border-radius:8px;background:#E8E0D0;display:flex;align-items:center;justify-content:center;color:#999;font-size:24px;overflow:hidden}
.exchange-thumb img{width:100%;height:100%;object-fit:cover}
.exchange-body{flex:1;min-width:0}
.exchange-title{font-size:var(--fs-md);font-weight:600;color:var(--text);margin-bottom:var(--sp-1)}
.exchange-meta{font-size:var(--fs-xs);color:var(--muted);margin-bottom:var(--sp-1)}
.exchange-tags{display:flex;gap:var(--sp-1);margin-top:4px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;padding:2px var(--sp-2);font-size:var(--fs-xs);border-radius:var(--radius-tag);background:var(--primary-light);color:var(--primary-deep)}
.tag-free{background:var(--primary-light);color:var(--primary-deep)}
.tag-paid{background:#FCE4D9;color:#A04D3A}
.tag-barter{background:#FCEEC3;color:#8A6A1E}
.home-view-all{margin-top:var(--sp-3)}

/* ════════════════════════════════════════════════════════════════════
   CLUSTER 5 OVERLAY (~30 lines) — defined AFTER the existing rules so
   it wins on cascade. Touches only token values + decorative styling.
   No layout / size / interaction changes. See apply-plan.md §2.
   ════════════════════════════════════════════════════════════════════ */
:root {
  /* parchment 1pt warmer */
  --bg-page: #F5F0E6;
  /* olive (printed-ink), not forest (SaaS) */
  --primary: #3D5A2E;
  --primary-deep: #2A3F20;
  /* no shadow on chrome — borders instead */
  --shadow-1: 0 0 0 transparent;
  --card-border: 1px solid rgba(61, 90, 46, 0.18);
  /* CTAs: 8px not pill — printed-card identity */
  --radius-btn: 8px;
  /* 中文 serif display family — 思源宋体 / Noto Serif SC, fallback Songti SC */
  --font-display: "Source Han Serif SC", "Noto Serif SC", "Songti SC", Georgia, ui-serif, serif;
  /* 楷体 for short artisan accents (stamp seal lettering) */
  --font-script: "STKaiti", "KaiTi", "楷体", "Source Han Serif SC", serif;
}

body {
  background-color: var(--bg-page);
  /* 6px paper-grain dot pattern, barely visible */
  background-image: radial-gradient(rgba(61, 90, 46, 0.05) 0.5px, transparent 0.5px);
  background-size: 8px 8px;
}

/* H1 and section heads: 思源宋体 + 字重 + 适度字距（中文不用 italic） */
.home-hero-title,
.home-section-head h2 {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: 0.02em;
  color: var(--primary-deep);
}
.home-hero-title { font-weight: 600; }

/* Card chrome: drop shadow, add olive-on-cream border. CONTENT (thumbnail)
   unchanged — only the surrounding card */
.exchange-card {
  box-shadow: none !important;
  border: var(--card-border);
}

/* CTAs: olive solid, 8px radius, no shadow */
button, .btn {
  box-shadow: none !important;
}
.btn-block {
  border-radius: var(--radius-btn) !important;
}
.btn-line {
  border-color: var(--primary);
  color: var(--primary);
}

/* Tags: adjust the free tag to match olive scale (semantic unchanged: still green = safe) */
.tag-free {
  background: rgba(61, 90, 46, 0.12);
  color: var(--primary-deep);
}

/* count badge — adjust similarly */
.count-badge {
  background: rgba(61, 90, 46, 0.12);
  color: var(--primary-deep);
}

/* ── Decorative additions (chrome only; user content untouched) ───────── */

/* Stamp/seal block under H1+sub — Cluster 5 identity primitive */
.c5-stamp-row {
  margin-top: var(--sp-3);
  padding-top: var(--sp-3);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  border-top: 1px dashed rgba(61, 90, 46, 0.25);
}
.c5-stamp { flex-shrink: 0; }
.c5-stamp-words {
  font-family: var(--font-script);
  font-size: var(--fs-xs);
  color: rgba(61, 90, 46, 0.7);
  line-height: 1.4;
}
.c5-stamp-words em { font-style: normal; color: var(--primary-deep); }

/* small watercolor sprig (botanical-wreath asset) next to H1, replacing the 🌱 emoji */
.c5-hero-sprig {
  width: 44px; height: 44px;
  vertical-align: middle;
  margin-right: 8px;
  display: inline-block;
}

/* Section head: small botanical bullet replaces the bullet glyph */
.home-section-head h2 {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.home-section-head h2::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  display: inline-block;
}
</style>
</head>
<body>

<div class="view">
  <h1 class="home-hero-title">
    <!-- watercolor sprig replaces the 🌱 emoji; user-content thumbnails below
         stay unchanged — only chrome decoration uses watercolor -->
    <img src="./assets/botanical-wreath.png" alt="" class="c5-hero-sprig" aria-hidden="true" />
    菜友集市
  </h1>
  <div class="home-sub">Portland 华人菜友周末大会 · 本周六 5月17日 11:00–2:30 · 📍<a class="link" style="color:var(--primary);text-decoration:none;border-bottom:1px solid var(--primary)">Tushita Farm</a></div>

  <!-- Cluster 5 stamp/seal row — added decoration, no UX change -->
  <div class="c5-stamp-row">
    <svg class="c5-stamp" width="56" height="56" viewBox="0 0 64 64" aria-hidden="true">
      <circle cx="32" cy="32" r="29" fill="none" stroke="#3D5A2E" stroke-width="1.2"/>

      <path d="M 11 32 Q 9 30 11 28 Q 13 30 11 32 Z" fill="#5A8A6A" opacity=".7"/>
      <path d="M 53 32 Q 55 30 53 28 Q 51 30 53 32 Z" fill="#5A8A6A" opacity=".7"/>
    </svg>
    <div class="c5-stamp-words">
      <div><em>第 17 次</em> 周末换菜大会</div>
      <div>始于 2024 · 菜友自治</div>
    </div>
  </div>

  <div class="home-actions">
    <button class="btn-block">🌾 我要出让</button>
    <button class="btn-block">🌿 我想获得</button>

  <div class="exchange-card">
    <div class="exchange-thumb">🍅</div>

  </div>

  <div class="exchange-card">
    <div class="exchange-thumb">🌶</div>
    <div class="exchange-body">
      <div class="exchange-title">番茄籽 · 樱桃番茄</div>
      <div class="exchange-meta">林姐 · 剩余 20 包 · 昨天</div>
      <div class="exchange-tags"><span class="tag tag-barter">换物</span><span class="tag">需确认</span></div>
    </div>
  </div>

  <div class="exchange-card">
    <div class="exchange-thumb">🌱</div>
    <div class="exchange-body">
      <div class="exchange-title">薄荷苗 · 苹果薄荷</div>
      <div class="exchange-meta">张老师 · 剩余 5 株 · 3 天前</div>
      <div class="exchange-tags"><span class="tag tag-paid">$2/株</span><span class="tag">会带去</span></div>
    </div>
  </div>

  <div class="home-section-head">
    <h2>求 <span class="count-badge">8</span></h2>
    <a class="link">查看全部 →</a>
  </div>

  <div class="exchange-card">
    <div class="exchange-thumb">📋</div>
    <div class="exchange-body">
      <div class="exchange-title">寻 · 韭菜种子</div>
      <div class="exchange-meta">小赵 · 需 1 包 · 1 小时前</div>
    </div>
  </div>

  <button class="btn-line btn-block home-view-all">🛒 查看全部集市</button>
</div>

</body>
</html>
